<!DOCTYPE html>
<!--
  OG card source for /the-mesh — rendered, not generated by satori.
  Reuses the live hero markup + /styles.css so the highlighter (feTurbulence
  roughness, double swipe, translucency) and photo treatment are identical to
  the page. Open at localhost:8015/_og-the-mesh.html, viewport 1200x630, and
  screenshot the .ogcard region to produce public/og/the-mesh.png.
  No byline, no URL. The photo is full-bleed; the tagline sits over a
  semi-transparent scrim so the image stays visible beneath it.
  The <h1> stays INSIDE .mesh-hero-photo — that parent gives the title its
  dark ink color and makes the highlighter swipe stack correctly.
-->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); }
    *, *::before, *::after { box-sizing: border-box; }
    .ogcard {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--bg);
    }
    /* Full-bleed photo behind everything. */
    .ogcard .mesh-hero-photo {
      position: absolute;
      inset: 0;
      margin: 0;
      border-radius: 0;
      aspect-ratio: auto;
      width: 1200px;
      height: 630px;
    }
    .ogcard .mesh-hero-photo img { object-position: 50% 42%; }
    /* Drop the page's built-in bottom scrim; the tagline scrim below replaces it. */
    .ogcard .mesh-hero-photo::after { display: none; }
    /* Title: full width so it centers across the photo, sized up, nudged into
       the upper-middle so the tagline has room below. */
    .ogcard .mesh-hero-title {
      width: 1200px;
      max-width: none;
      font-size: 132px;
      letter-spacing: -0.012em;
      align-items: flex-start;
      padding-top: 138px;
    }
    /* Organic scrim — a rounded "mound" of shadow rising from the bottom-centre
       rather than a flat horizontal band, so its top edge curves off at the
       sides instead of cutting a straight line across the bright left of the
       photo. Dark enough under the text to read, transparent at the crest. */
    .ogcard .scrim {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 470px;
      pointer-events: none;
      background: radial-gradient(
        82% 100% at 50% 100%,
        rgba(18, 17, 15, 0.9) 0%,
        rgba(18, 17, 15, 0.72) 34%,
        rgba(18, 17, 15, 0.4) 60%,
        rgba(18, 17, 15, 0) 82%
      );
    }
    /* Tagline sits over the scrim. */
    .ogcard .tag-area {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 212px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 90px 16px;
    }
    .ogcard .mesh-tagline {
      font-size: 46px;
      line-height: 1.16;
      max-width: 940px;
      margin: 0;
    }
    /* Brand signature — same font, size, weight, position and colour as the
       other OG cards (IBM Plex Mono 700, 36px, light FG, 80px inset). A soft
       dark shadow is the only addition, for legibility over the photo. */
    .ogcard .wordmark {
      position: absolute;
      top: 42px;
      left: 46px;
      z-index: 4;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 36px;
      line-height: 1;
      letter-spacing: 0.08em;
      /* Dark ink stamp in the corner — solid, no glow. Plex Mono tops out at
         600, so a stroke in the same ink adds the extra weight. */
      color: #1c1813;
      -webkit-text-stroke: 0.7px #1c1813;
    }
  </style>
</head>
<body>
  <div class="ogcard">
    <div class="wordmark">t15n</div>
    <div class="mesh-hero-photo">
      <img src="/img/mesh-hero.jpg" alt="A person working at a laptop, a second laptop across the table." width="2000" height="1333">
      <h1 class="mesh-hero-title"><span class="mesh-hl"><svg class="mesh-hl-mark" viewBox="0 0 300 80" preserveAspectRatio="none" aria-hidden="true"><defs><filter id="hlrough" x="-8%" y="-25%" width="116%" height="150%"><feTurbulence type="fractalNoise" baseFrequency="0.022 0.075" numOctaves="2" seed="4" result="t"/><feDisplacementMap in="SourceGraphic" in2="t" scale="11" xChannelSelector="R" yChannelSelector="G"/></filter><linearGradient id="hlfill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f4e24a" stop-opacity="0.3"/><stop offset="0.13" stop-color="#f4e24a" stop-opacity="0.88"/><stop offset="0.5" stop-color="#efd838" stop-opacity="0.95"/><stop offset="0.87" stop-color="#f4e24a" stop-opacity="0.88"/><stop offset="1" stop-color="#f4e24a" stop-opacity="0.34"/></linearGradient></defs><rect x="6" y="9" width="288" height="48" rx="22" fill="url(#hlfill)" filter="url(#hlrough)" opacity="0.58"/><rect x="9" y="23" width="285" height="48" rx="22" fill="url(#hlfill)" filter="url(#hlrough)" opacity="0.58"/></svg>The Mesh</span></h1>
    </div>
    <div class="scrim"></div>
    <div class="tag-area">
      <p class="mesh-tagline">A knowledge base that writes with you, <span class="mesh-tw">not just for you.</span></p>
    </div>
  </div>
</body>
</html>
